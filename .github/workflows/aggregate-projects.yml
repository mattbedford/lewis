name: Build Projects

on:
  push:
    paths:
      - 'content/projects/**'
      # The identity graph and build logic live here; editing the trio must
      # also re-run the build so the injected region in static pages updates.
      - 'scripts/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build project pages
        run: node scripts/build-projects.js

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add projects.json projects/ sitemap.xml index.html about.html project.html
          git diff --staged --quiet || git commit -m 'Auto-build project pages from content/projects'
          git push
